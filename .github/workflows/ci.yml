name: Go CI

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'
    paths:
      - '.github/workflows/**.yml'
      - '**/go.*'
      - '**/*.go'
  pull_request:
    branches:
      - '**'
    paths:
      - '.github/workflows/**.yml'
      - '**/go.*'
      - '**/*.go'

jobs:

  strongo_workflow:
    uses: strongo/cicd/.github/workflows/workflow.yml@main
    permissions:
      contents: write
    secrets:
      # No private Go modules — the built-in token is sufficient.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      code_coverage: true
      # Releases are deliberate pre-1.0 (docs/release-process.md): manual
      # annotated tags + CHANGELOG, not auto-bumped patches.
      disable-version-bumping: true
